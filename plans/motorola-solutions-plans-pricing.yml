specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Motorola Solutions
providerId: motorola-solutions
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Public Safety
  - Land Mobile Radio
  - Mission Critical
  - Communications
description: API access is governed by the Motorola Solutions Application Partner Developer Program (ADP).
  MOTOTRBO APIs are licensed free of charge under a 3-year term to approved program members; ASTRO 25
  APIs carry a license fee that is quoted per project by Motorola Solutions ADP. TETRA, DIMETRA, Intelligent
  Middleware (IMW), and Broadband Push-to-X APIs are reached through the same partner-gated program.
  No public list pricing is published; all pricing requires a quotation request.
sources:
  - https://www.motorolasolutions.com/en_us/partners/become-partner/application-partner-developer-program.html
  - https://www.motorolasolutions.com/en_xa/developers/application-partner-developer-program/faqs.html
  - https://www.motorolasolutions.com/en_xu/products/mototrbo/mototrbo-application-developer-programme/mototrbo-application-portfolio.html
plans:
  - id: motorola-solutions-mototrbo-adp
    name: MOTOTRBO ADP License
    type: enterprise
    description: Free, three-year-term API license for approved MOTOTRBO Application Developer Program
      members. Renewable; covers MOTOTRBO data, voice, and dispatch APIs.
    entries:
      - label: 3-year API license
        name: mototrbo_license
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: MOTOTRBO data, voice, and dispatch APIs
      - name: ADP engineering support
      - name: Renewable 3-year term
  - id: motorola-solutions-astro-adp
    name: ASTRO 25 ADP License
    type: enterprise
    description: Paid API license for the ASTRO 25 mission-critical land mobile radio platform. Fees are
      project-dependent and quoted by ADP licensing.
    entries:
      - label: ASTRO 25 API license
        name: astro_license
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: project-dependent (contact ADPLicensing@motorolasolutions.com)
        userMultiplied: false
    elements:
      - name: ASTRO 25 Subscriber APIs
      - name: ASTRO 25 infrastructure integration APIs
      - name: ADP engineering support
  - id: motorola-solutions-imw-tetra-broadband
    name: IMW / TETRA / DIMETRA / Broadband Push-to-X
    type: enterprise
    description: Partner-gated API access to Intelligent Middleware (IMW), TETRA, DIMETRA, and broadband
      Push-to-X services. Pricing via ADP licensing.
    entries:
      - label: Partner license
        name: imw_license
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: contact ADPLicensing@motorolasolutions.com
        userMultiplied: false
    elements:
      - name: Intelligent Middleware (IMW) APIs (technology-agnostic)
      - name: TETRA / DIMETRA APIs
      - name: Broadband Push-to-X service APIs
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
