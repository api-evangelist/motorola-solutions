naftiko: 1.0.0-alpha2
info:
  label: Motorola Solutions API — Public Safety
  description: 'Motorola Solutions API — Public Safety. 1 operations. Lead operation: Get API status. Self-contained Naftiko
    capability covering one Motorola Solutions business surface.'
  tags:
  - Motorola Solutions
  - Public Safety
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MOTOROLA_SOLUTIONS_API_KEY: MOTOROLA_SOLUTIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: motorola-public-safety
    baseUri: https://api.motorolasolutions.com
    description: Motorola Solutions API — Public Safety business capability. Self-contained, no shared references.
    resources:
    - name: status
      path: /status
      operations:
      - name: getstatus
        method: GET
        description: Get API status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MOTOROLA_SOLUTIONS_API_KEY}}'
  exposes:
  - type: rest
    namespace: motorola-public-safety-rest
    port: 8080
    description: REST adapter for Motorola Solutions API — Public Safety. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/status
      name: status
      description: REST surface for status.
      operations:
      - method: GET
        name: getstatus
        description: Get API status
        call: motorola-public-safety.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: motorola-public-safety-mcp
    port: 9090
    transport: http
    description: MCP adapter for Motorola Solutions API — Public Safety. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-api-status
      description: Get API status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: motorola-public-safety.getstatus
      outputParameters:
      - type: object
        mapping: $.
