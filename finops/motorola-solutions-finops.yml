principles:
  - name: Visibility
    description: Track ADP license status (renewal date, scope) and project-services invoices in the financial
      system; the platform itself emits no per-call billing telemetry.
  - name: Allocation
    description: Allocate ADP license cost to the partner product line that ships against MOTOTRBO, ASTRO
      25, TETRA / DIMETRA, IMW, or broadband Push-to-X.
  - name: Optimization
    description: Optimization is realized by choosing the minimum required API surface (MOTOTRBO is free
      for a 3-year term; ASTRO 25 carries a fee) and by aligning renewal cycles across partner products.
  - name: Accountability
    description: The partner program PM owns ADP license renewal; the integration engineering lead monitors
      operational health inside the deployed radio system; procurement owns the renewal calendar.
