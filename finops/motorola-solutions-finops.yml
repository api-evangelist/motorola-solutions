description: 'FOCUS-aligned FinOps for Motorola Solutions: API access is gated through the Application
  Partner Developer Program. MOTOTRBO API licenses are free for 3-year terms; ASTRO 25 carries a project-quoted
  license fee. There is no metered consumption surface — costs are fixed-term licenses plus the underlying
  radio-system contract.'
