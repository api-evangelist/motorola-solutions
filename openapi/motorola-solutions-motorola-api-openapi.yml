openapi: 3.1.0
info:
  title: Motorola Solutions API
  description: >-
    Motorola Solutions provides APIs for public safety communications, command center software, and video security integration. The platform enables partners to build on Motorola's public safety infrastructure.
  version: '1.0'
  contact:
    name: Motorola Solutions Developer Support
    url: https://developer.motorolasolutions.com/
externalDocs:
  description: Documentation
  url: https://developer.motorolasolutions.com/
servers:
  - url: https://api.motorolasolutions.com
    description: Production
tags:
  - name: Public Safety
    description: Public Safety operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Public Safety
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
