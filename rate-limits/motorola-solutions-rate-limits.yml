specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Motorola Solutions
providerId: motorola-solutions
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Public Safety
  - Land Mobile Radio
  - Mission Critical
description: Motorola Solutions ADP APIs run inside customer-deployed radio infrastructure (MOTOTRBO,
  ASTRO 25, TETRA / DIMETRA, broadband Push-to-X). Rate, throughput, and concurrency limits are sized
  by the deploying agency / operator and are not published as a single public number. Documentation lives
  inside the gated developer portal at code.motorolasolutions.com.
sources:
  - https://www.motorolasolutions.com/en_us/partners/become-partner/application-partner-developer-program.html
  - https://www.motorolasolutions.com/en_xa/developers/application-partner-developer-program/resources.html
notes: No public per-second / per-minute numbers are published; reconciled set to false.
responseCodes:
  throttled: 429
limits:
  - name: Deployment-defined throughput
    scope: deployment
    metric: varies
    limit: see ADP developer portal (gated)
    notes: Sized to the radio system's capacity (sites, talkgroups, subscribers) and the integration's
      operational profile.
policies:
  - name: Mission-critical priority
    description: ASTRO 25 and TETRA / DIMETRA enforce mission-critical priority for voice and dispatch
      traffic; data API consumers are deprioritized when contention occurs.
  - name: ADP guidance
    description: Approved developers consult the ADP developer portal (code.motorolasolutions.com) and
      Motorola Solutions ADP engineering team for endpoint-specific throughput recommendations.
  - name: Operator sizing
    description: The owning agency / operator sizes infrastructure and defines its own integration throughput
      ceiling on top of the platform.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
